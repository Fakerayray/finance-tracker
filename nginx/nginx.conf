events {}

http {
    upstream user_api {
	server user-service:5000;
    }
    upstream data_api {
	server data-service:5000;
    }
    upstream frontend {
        server frontend:80;
    }
    upstream backend {
        server backend:5000;
    }

    server {
        listen 80;
	

        # Route to React Frontend
        location / {
            proxy_pass http://frontend;
        }

        # Route to Flask API
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
	
	location /api/users/ {
	    proxy_pass http://user_api/;
	    proxy_set_header Host $host;
	}
	location /api/data/ {
            proxy_pass http://user_api/;
	    proxy_set_header Host $host;
        }

    }
}
