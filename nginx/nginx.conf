events {}

http {
    upstream frontend {
        server frontend:80;
    }
    upstream backend {
        server backend:5000;
    }

    server {
        listen 80;

        # Route to React Frontend
        location / {
            proxy_pass http://frontend;
        }

        # Route to Flask API
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
