events {}

http {
    upstream frontend {
        server frontend:3000;
    }
    upstream backend {
        server backend:5000;
    }

    server {
        listen 80;

        # Route to React Frontend
        location / {
            proxy_pass http://frontend;
        }

        # Route to Flask API
        location /api/ {
            proxy_pass http://backend;
        }
    }
}
